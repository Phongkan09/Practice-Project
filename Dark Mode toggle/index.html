<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Toggle</title>
    <style>
        /* 1. ธีมสว่าง (ค่าเริ่มต้น) */
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background-color: white;
            color: black;
            transition: all 0.3s ease; /* ทำให้ตอนเปลี่ยนสีมันดูนุ่มนวล */
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* 2. ธีมมืด (เราจะใช้ JS สั่งเติมคลาสนี้เข้าไปในแท็ก <body>) */
        body.dark-theme {
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>

    <h1>ระบบ Dark Mode 🌗</h1>
    <p>ลองกดปุ่มด้านล่างเพื่อสลับธีม แล้วกด Refresh หน้าเว็บดูสิ!</p>

    <button id="themeToggleBtn">เปิดโหมดมืด 🌙</button>

    <script src="script.js"></script>
</body>
</html>
