<!DOCTYPE html>
<html lang="en">
<head>

    <title>Cat Fact API</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; background-color: #f4f4f9; }

        button:hover { background-color: #ff5252; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🐈 รู้หรือไม่?</h2>

        <button id="fetchBtn">สุ่มเรื่องแมว 1 เรื่อง</button>
    </div>

    <script src="script.js"></script>

</html>
