<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMUTP Food Court</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #menuContainer {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        /* ดีไซน์ของเมนูแต่ละกล่อง */
        .menu-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 250px;
            text-align: center;
        }

        .store-name {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .menu-name {
            font-size: 20px;
            font-weight: bold;
            color: #d35400;
            margin: 10px 0;
        }

        .price {
            font-size: 18px;
            color: #27ae60;
            font-weight: bold;
        }
        #search{
            width: 300px;
            height: 30px;
            border-radius: 10px;
            padding: 4px;
        }
        .search{
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>🍽️ ศูนย์อาหาร มทร.พระนคร</h1>
    <div class="search">
        <input type="search" name="search-bar" id="search" placeholder="ค้นหามื้อสุดอร่อยของคุณ...">
    </div>
    <div id="menuContainer">
    </div>

    <script src="script.js"></script>
</body>

</html>
